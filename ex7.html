<!DOCTYPE html>
<html lang="en">

    <meta charset="UTF-8">

<body>
    <script>
        // Exercice 5 : Tester si un nombre est premier

function estPremier() {
    let n = parseInt(prompt("Donnez un entier positif :"));

    if (n < 2) {
        console.log(n + " n'est pas un nombre premier.");
        return;
    }

    let premier = true; 
    let diviseur = 0;

    
    for (let i = 2; i <= Math.sqrt(n); i++) {
        if (n % i === 0) {
            premier = false;
            diviseur = i;
            break; 
        }
    }

    if (premier) {
        console.log(n + " est un nombre premier.");
    } else {
        console.log(n + " n'est pas un nombre premier, il est divisible par " + diviseur);
    }
}


estPremier();
    </script>
</body>
</html>
